<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Cliente - Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primaria: #2E8B57;
            --preto-deep: #0F172A;
            --cinza-texto: #64748B;
            --branco: #FFFFFF;
            --fundo-gradiente: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            --alerta: #FF9500;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--fundo-gradiente);
            color: var(--preto-deep);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-sizing: border-box;
            padding-bottom: 100px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 25px;
        }

        .btn-voltar {
            background: var(--branco);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            cursor: pointer;
        }

        .resumo-topo {
            background: var(--preto-deep);
            color: var(--branco);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }

        .resumo-topo h2 { margin: 0 0 15px 0; font-size: 1.4rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item span { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; }
        .stat-item b { display: block; font-size: 1.1rem; margin-top: 4px; }

        /* Lista de Dívidas Dinâmica */
        .card-divida {
            background: var(--branco);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .card-divida:active { transform: scale(0.98); }
        .divida-header { font-weight: 700; color: var(--cinza-texto); font-size: 0.85rem; text-transform: uppercase; }

        .divida-info {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            align-items: center;
            margin-top: 10px;
        }

        .valor-principal { color: var(--primaria); font-weight: 800; font-size: 1rem; }
        .parcelas-info, .restante-info { font-size: 0.85rem; text-align: right; }
        .label-pequena { display: block; font-size: 0.65rem; color: var(--cinza-texto); text-transform: uppercase; }

        .btn-adicionar-divida {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primaria);
            color: var(--branco);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(46, 139, 87, 0.4);
            border: none;
            cursor: pointer;
        }

        /* Modal de Opções */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
        }

        .menu-opcoes {
            background: var(--branco);
            width: 100%;
            max-width: 400px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .opcao-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            width: 100%;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--preto-deep);
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            text-align: left;
        }

        .opcao-item i { color: var(--primaria); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="btn-voltar" onclick="window.location.href='Lista_clientes.html'">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>Perfil Financeiro</h2>
        </header>

        <div class="resumo-topo">
            <h2 id="nome-cliente">Carregando...</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span>Total Dívidas</span>
                    <b id="total-dividas">R$ 0,00</b>
                </div>
                <div class="stat-item">
                    <span>Total Pendente</span>
                    <b id="total-pendente" style="color: var(--alerta);">R$ 0,00</b>
                </div>
            </div>
        </div>

        <h3 style="font-size: 1rem; margin-bottom: 15px;">Dívidas Ativas</h3>

        <div class="lista-dividas" id="container-dividas">
            </div>

        <button class="btn-adicionar-divida" onclick="irParaCadastro()">
            <i data-lucide="plus" size="32"></i>
        </button>
    </div>

    <div class="overlay" id="overlayOpcoes" onclick="fecharOpcoes()">
        <div class="menu-opcoes" onclick="event.stopPropagation()">
            <button class="opcao-item" onclick="irParaDetalhesDivida(dividaSelecionada)">
                <i data-lucide="eye"></i> Ver detalhes da dívida
            </button>
            <button class="opcao-item" onclick="irParaPagamento(dividaSelecionada)">
                <i data-lucide="dollar-sign"></i> Adicionar pagamento
            </button>
            <button class="opcao-item" onclick="alert('Funcionalidade em breve...')">
                <i data-lucide="edit-3"></i> Editar dívida
            </button>
            <button class="opcao-item" style="color: #ef4444; border: none; margin-top: 10px;" onclick="fecharOpcoes()">
                Fechar
            </button>
        </div>
    </div>

    <script src="banco.js"></script>
    <script>
        lucide.createIcons();

        let dividaSelecionada = "";
        const urlParams = new URLSearchParams(window.location.search);
        const nomeClienteURL = urlParams.get('cliente') || "Amanda"; 
        
        // 1. Atualiza o nome no topo
        document.getElementById('nome-cliente').innerText = nomeClienteURL;

        // 2. Busca os dados no Banco.js
        const dadosApp = Banco.getDados();
        const clienteObj = dadosApp.clientes.find(c => c.nome === nomeClienteURL);

        // 3. Renderiza as dívidas
        const container = document.getElementById('container-dividas');
        
        if (clienteObj && clienteObj.dividas.length > 0) {
            let somaTotal = 0;
            let somaPendente = 0;

            clienteObj.dividas.forEach(divida => {
                somaTotal += divida.valorTotal;
                somaPendente += divida.saldoRestante;

                const card = `
                    <div class="card-divida" onclick="abrirOpcoes('${divida.titulo}')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <span class="divida-header">${divida.titulo}</span>
                            <span style="font-size: 0.7rem; color: var(--cinza-texto);">${divida.data}</span>
                        </div>
                        <div class="divida-info">
                            <div class="valor-principal">R$ ${divida.valorTotal.toFixed(2)}</div>
                            <div class="parcelas-info">
                                <span class="label-pequena">PARCELAS</span>
                                <b>${divida.pagas}/${divida.totalParcelas}</b>
                            </div>
                            <div class="restante-info">
                                <span class="label-pequena">RESTANTE</span>
                                <b>R$ ${divida.saldoRestante.toFixed(2)}</b>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            // Atualiza o resumo financeiro do topo
            document.getElementById('total-dividas').innerText = `R$ ${somaTotal.toFixed(2)}`;
            document.getElementById('total-pendente').innerText = `R$ ${somaPendente.toFixed(2)}`;

        } else {
            container.innerHTML = '<p style="text-align:center; padding: 40px; color: var(--cinza-texto);">Este cliente não possui dívidas cadastradas.</p>';
        }

        // Funções de Navegação e Menu
        function abrirOpcoes(nomeDivida) {
            dividaSelecionada = nomeDivida;
            document.getElementById('overlayOpcoes').style.display = 'flex';
        }

        function fecharOpcoes() {
            document.getElementById('overlayOpcoes').style.display = 'none';
        }

        function irParaDetalhesDivida(nomeDivida) {
            window.location.href = `Detalhes-divida.html?cliente=${encodeURIComponent(nomeClienteURL)}&divida=${encodeURIComponent(nomeDivida)}`;
        }

        function irParaPagamento(nomeDivida) {
            window.location.href = `Adicionar_pagamento.html?cliente=${encodeURIComponent(nomeClienteURL)}&divida=${encodeURIComponent(nomeDivida)}`;
        }

        function irParaCadastro() {
            window.location.href = `Adicionar_divida.html?cliente=${encodeURIComponent(nomeClienteURL)}`;
        }
    </script>
</body>
</html>
