<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes - Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primaria: #2E8B57;
            --primaria-hover: #3CB371;
            --preto-deep: #0F172A;
            --cinza-texto: #64748B;
            --branco: #FFFFFF;
            --fundo-gradiente: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--fundo-gradiente); color: var(--preto-deep); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 24px; box-sizing: border-box; }
        header { display: flex; align-items: center; gap: 16px; margin-bottom: 25px; }
        .btn-voltar { background: var(--branco); border: none; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { font-size: 1.3rem; margin: 0; font-weight: 700; }
        
        .busca-container { background: var(--branco); padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); margin-bottom: 25px; }
        .busca-container input { border: none; outline: none; width: 100%; font-size: 1rem; color: var(--preto-deep); }
        
        .lista-clientes { display: flex; flex-direction: column; gap: 12px; }
        .card-cliente { background: var(--branco); padding: 16px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #f1f5f9; color: var(--primaria); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .detalhes b { display: block; font-size: 1rem; margin-bottom: 2px; }
        .detalhes span { font-size: 0.8rem; color: var(--cinza-texto); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="btn-voltar" onclick="window.location.href='Cadastros.html'">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>Meus Clientes</h2>
        </header>

        <div class="busca-container">
            <i data-lucide="search" size="20"></i>
            <input type="text" id="inputBusca" placeholder="Buscar cliente por nome..." onkeyup="filtrarClientes()">
        </div>

        <div class="lista-clientes" id="listaClientes">
            </div>
    </div>

    <script src="banco.js"></script>
    <script>
        lucide.createIcons();

        function carregarClientes() {
            const container = document.getElementById('listaClientes');
            container.innerHTML = "";

            // BUSCA REAL NO BANCO
            const dados = Banco.getDados();
            const clientes = dados.clientes;

            if (clientes.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--cinza-texto);'>Nenhum cliente cadastrado ainda.</p>";
                return;
            }

            clientes.forEach(cliente => {
                const inicial = cliente.nome.charAt(0).toUpperCase();
                container.innerHTML += `
                    <div class="card-cliente" onclick="verDetalhes('${cliente.nome}')">
                        <div class="info-principal" style="display: flex; align-items: center; gap: 15px;">
                            <div class="avatar">${inicial}</div>
                            <div class="detalhes">
                                <b>${cliente.nome}</b>
                                <span>${cliente.celular}</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" size="20" style="color:var(--cinza-texto)"></i>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function filtrarClientes() {
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const cards = document.getElementsByClassName('card-cliente');
            for (let i = 0; i < cards.length; i++) {
                let nome = cards[i].querySelector('.detalhes b').innerText.toLowerCase();
                cards[i].style.display = nome.includes(busca) ? "flex" : "none";
            }
        }

        function verDetalhes(nome) {
            window.location.href = 'detalhes_cliente.html?cliente=' + encodeURIComponent(nome);
        }

        // Carrega os clientes assim que a página abrir
        carregarClientes();
    </script>
</body>
</html>
